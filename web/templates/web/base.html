{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Investiment Collector{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'web/css/tailwind.css' %}" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="border-b bg-white">
      <div class="mx-auto max-w-5xl px-4 py-4">
        <div class="flex items-center justify-between">
          <div class="text-lg font-semibold">Investiment Collector</div>
          <nav class="text-sm text-slate-600">MVP</nav>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-6">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
